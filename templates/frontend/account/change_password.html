{% extends 'frontend/base.html' %}

{% block title %}Parolni o'zgartirish - Wholesale{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row g-4">
        <!-- Sidebar -->
        <div class="col-lg-3">
            {% include 'frontend/account/_sidebar.html' %}
        </div>

        <!-- Main Content -->
        <div class="col-lg-9">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white">
                    <h5 class="mb-0"><i class="bi bi-shield-lock"></i> Parolni o'zgartirish</h5>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="row justify-content-center">
                            <div class="col-md-8 col-lg-6">
                                <div class="mb-3">
                                    <label class="form-label">Joriy parol</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                        <input type="password" name="old_password" class="form-control" placeholder="Hozirgi parolingiz" required>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Yangi parol</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                                        <input type="password" name="new_password" class="form-control" placeholder="Yangi parol yarating" required minlength="8">
                                    </div>
                                    <small class="text-muted">Kamida 8 ta belgi bo'lishi kerak</small>
                                </div>

                                <div class="mb-4">
                                    <label class="form-label">Yangi parolni tasdiqlang</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                                        <input type="password" name="new_password_confirm" class="form-control" placeholder="Yangi parolni takrorlang" required minlength="8">
                                    </div>
                                </div>

                                <button type="submit" class="btn btn-primary w-100">
                                    <i class="bi bi-check-lg"></i> Parolni o'zgartirish
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
