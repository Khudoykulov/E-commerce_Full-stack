{% extends 'frontend/base.html' %}

{% block title %}Ro'yxatdan o'tish - Wholesale{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <i class="bi bi-person-plus display-4 text-primary"></i>
                        <h3 class="mt-2">Ro'yxatdan o'tish</h3>
                        <p class="text-muted">Yangi hisob yarating</p>
                    </div>

                    <form method="post">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">Ism</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person"></i></span>
                                <input type="text" name="name" class="form-control" placeholder="Ismingiz" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Telefon raqam</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-phone"></i></span>
                                <input type="text" name="phone" class="form-control" placeholder="901234567" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Parol</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                <input type="password" name="password1" class="form-control" placeholder="Parol yarating" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Parolni tasdiqlang</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                                <input type="password" name="password2" class="form-control" placeholder="Parolni takrorlang" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 btn-lg">
                            <i class="bi bi-person-plus"></i> Ro'yxatdan o'tish
                        </button>
                    </form>

                    <hr class="my-4">

                    <div class="text-center">
                        <p class="mb-0">Hisobingiz bormi?
                            <a href="{% url 'frontend:login' %}" class="text-decoration-none">Tizimga kiring</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
